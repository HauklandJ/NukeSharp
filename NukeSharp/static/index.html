<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <title>NukeSharp</title>
    <script src="https://unpkg.com/htmx.org@1.9.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/1.0.2/chartjs-plugin-annotation.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>
<body>

    <div class="container" style="padding-top:20px">
        <div hx-get="/pressure" hx-trigger="every 1s, load" hx-swap="innerHTML"></div>
    </div>
    <div style="padding-left:80px; padding-right:80px">
        <canvas id="pressureChart" width="200" height="100"></canvas>
    </div>
    <div class="container">
        <form hx-post="/thresholds"
              hx-target="#threshold-status"
              hx-swap="innerHTML"
              hx-on::after-request="onThresholdsUpdated(event)">
            <div class="grid">
                <label>
                    Open valve at
                    <input id="openAt" name="openAt" type="number" step="0.01" min="0" max="1" value="{{openAt}}">
                </label>
                <label>
                    Close valve at
                    <input id="closeAt" name="closeAt" type="number" step="0.01" min="0" max="1" value="{{closeAt}}">
                </label>
                <div style="display:flex; align-items:flex-end">
                    <button type="submit">Update</button>
                </div>
            </div>
        </form>
        <small id="threshold-status"></small>
    </div>

    <script>
        const ctx = document.getElementById('pressureChart').getContext('2d');
        let pressureData = [];

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({ length: 100 }, (_, i) => i + 1),
                datasets: [{
                    label: 'Pressure (%) - Hover to see the value',
                    data: pressureData,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    y: { min: 0.2, max: 1 },
                    x: { min: 1, max: 100 }
                },
                plugins: {
                    annotation: {
                        annotations: {
                            safeZone: {
                                type: 'box',
                                yMin: 0.5,
                                yMax: 0.75,
                                borderColor: 'green',
                                backgroundColor: 'rgba(0, 128, 0, 0.3)'
                            },
                            dangerLine: {
                                type: 'line',
                                yMin: 0.9,
                                yMax: 0.9,
                                borderColor: 'red',
                                borderWidth: 2
                            },
                            openThreshold: {
                                type: 'line',
                                yMin: {{openAt}},
                                yMax: {{openAt}},
                                borderColor: 'orange',
                                borderWidth: 1,
                                borderDash: [4, 4],
                                label: { content: 'Open', display: true, position: 'end' }
                            },
                            closeThreshold: {
                                type: 'line',
                                yMin: {{closeAt}},
                                yMax: {{closeAt}},
                                borderColor: 'gold',
                                borderWidth: 1,
                                borderDash: [4, 4],
                                label: { content: 'Close', display: true, position: 'end' }
                            }
                        }
                    }
                }
            }
        });

        function onThresholdsUpdated(event) {
            if (!event.detail.successful) return;
            const openAt = parseFloat(document.getElementById('openAt').value);
            const closeAt = parseFloat(document.getElementById('closeAt').value);
            chart.options.plugins.annotation.annotations.openThreshold.yMin = openAt;
            chart.options.plugins.annotation.annotations.openThreshold.yMax = openAt;
            chart.options.plugins.annotation.annotations.closeThreshold.yMin = closeAt;
            chart.options.plugins.annotation.annotations.closeThreshold.yMax = closeAt;
            chart.update();
        }

        setInterval(async () => {
            const response = await fetch('/gethistoricmeasurements');
            const newPressureData = await response.json();
            chart.data.datasets[0].data = newPressureData;
            chart.update();
        }, 1000);
    </script>
</body>

</html>
